<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Speak Up · 영어 회화 학습 v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --bg-soft: #1a1925;
    --bg-card: #232133;
    --border: #2e2c40;
    --text: #fffffe;
    --text-soft: #a7a9be;
    --text-muted: #6b6d80;
    --accent: #ff8906;
    --accent-soft: #ffaa3b;
    --secondary: #e53170;
    --tertiary: #f25f4c;
    --success: #2cb67d;
    --info: #7f5af0;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    background-image: 
      radial-gradient(at 20% 0%, rgba(127, 90, 240, 0.15) 0px, transparent 50%),
      radial-gradient(at 80% 100%, rgba(255, 137, 6, 0.1) 0px, transparent 50%);
  }
  .display { font-family: 'Fraunces', serif; font-weight: 800; letter-spacing: -0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(15, 14, 23, 0.85);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 100;
  }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--secondary));
    border-radius: 8px;
    display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-weight: 800; font-size: 18px;
    color: var(--bg);
    transform: rotate(-3deg);
  }
  .logo-text { font-family: 'Fraunces', serif; font-weight: 800; font-size: 19px; letter-spacing: -0.02em; }
  .streak {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,137,6,0.12);
    border: 1px solid rgba(255,137,6,0.3);
    color: var(--accent-soft);
    padding: 6px 12px; border-radius: 100px;
    font-size: 13px; font-weight: 600;
  }

  nav.tabs {
    display: grid; grid-template-columns: repeat(5, 1fr);
    background: var(--bg-soft);
    border-top: 1px solid var(--border);
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    backdrop-filter: blur(20px);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab {
    background: none; border: none; color: var(--text-muted);
    padding: 12px 2px 14px;
    font-family: inherit; font-size: 10px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; transition: color 0.2s;
    position: relative;
  }
  .tab.active { color: var(--accent); }
  .tab.active::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 28px; height: 3px; background: var(--accent); border-radius: 0 0 3px 3px;
  }
  .tab-icon { font-size: 19px; }

  main { padding: 20px; max-width: 720px; margin: 0 auto; }
  .view { display: none; animation: fadeIn 0.3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .hero {
    background: linear-gradient(135deg, rgba(127,90,240,0.15), rgba(229,49,112,0.08));
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: ''; position: absolute; bottom: -40px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,137,6,0.2), transparent 70%);
    border-radius: 50%;
  }
  .hero-greeting { color: var(--text-soft); font-size: 14px; margin-bottom: 6px; }
  .hero-title { font-family: 'Fraunces', serif; font-weight: 800; font-size: 30px; line-height: 1.1; margin-bottom: 6px; }
  .hero-sub { color: var(--text-soft); font-size: 14px; margin-bottom: 18px; }
  .hero-progress {
    background: rgba(0,0,0,0.3); border-radius: 100px; height: 8px; overflow: hidden; margin-bottom: 8px;
  }
  .hero-progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--secondary));
    border-radius: 100px; transition: width 0.6s ease;
  }
  .hero-stats { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-soft); }

  .section-title {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 13px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;
    margin: 24px 0 12px;
  }

  /* Daily mission card */
  .mission-card {
    background: linear-gradient(135deg, var(--info), var(--secondary));
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    color: white;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .mission-card::before {
    content: '⭐'; position: absolute; right: 16px; top: 16px;
    font-size: 40px; opacity: 0.3;
  }
  .mission-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; opacity: 0.9; margin-bottom: 6px; }
  .mission-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; margin-bottom: 8px; }
  .mission-desc { font-size: 13px; opacity: 0.9; }
  .mission-progress {
    margin-top: 14px;
    background: rgba(255,255,255,0.2); border-radius: 100px; height: 6px; overflow: hidden;
  }
  .mission-progress-fill { height: 100%; background: white; border-radius: 100px; transition: width 0.5s; }

  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .quick-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    text-align: left;
    color: inherit;
    font-family: inherit;
  }
  .quick-card:active { transform: scale(0.97); border-color: var(--accent); }
  .quick-icon { font-size: 28px; margin-bottom: 10px; display: block; }
  .quick-label { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .quick-desc { color: var(--text-muted); font-size: 12px; }

  .day-list { display: flex; flex-direction: column; gap: 10px; }
  .day-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: border-color 0.2s, transform 0.15s;
  }
  .day-card:active { transform: scale(0.98); }
  .day-card.completed { background: rgba(44, 182, 125, 0.06); border-color: rgba(44,182,125,0.3); }
  .day-card.current { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .day-num {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--bg-soft);
    border-radius: 12px;
    display: grid; place-items: center;
    font-family: 'Fraunces', serif; font-weight: 800; font-size: 20px;
  }
  .day-card.completed .day-num { background: var(--success); color: var(--bg); }
  .day-card.current .day-num { background: var(--accent); color: var(--bg); }
  .day-info { flex: 1; min-width: 0; }
  .day-title { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .day-desc { color: var(--text-muted); font-size: 12.5px; }
  .day-status { color: var(--text-muted); font-size: 20px; }

  .category-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .category-pills::-webkit-scrollbar { display: none; }
  .pill {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-soft);
    padding: 8px 16px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    white-space: nowrap; cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .phrase-list { display: flex; flex-direction: column; gap: 10px; }
  .phrase-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .phrase-card.mastered { border-color: rgba(44,182,125,0.4); background: rgba(44,182,125,0.05); }
  .phrase-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-muted);
    margin-bottom: 4px;
  }
  .phrase-eng {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px;
    color: var(--text); margin-bottom: 4px; line-height: 1.3;
  }
  .phrase-kor { color: var(--text-soft); font-size: 14px; margin-bottom: 12px; }
  .phrase-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .action-btn {
    background: var(--bg-soft); border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    font-family: inherit; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .action-btn:active { transform: scale(0.96); }
  .action-btn.primary { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .action-btn.recording { background: var(--secondary); border-color: var(--secondary); color: white; animation: pulse 1.2s infinite; }
  .action-btn.master { margin-left: auto; }
  .action-btn.master.mastered { background: var(--success); border-color: var(--success); color: var(--bg); }
  .action-btn.big { padding: 14px 20px; font-size: 15px; font-weight: 600; }
  .action-btn.wide { width: 100%; justify-content: center; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }

  .score-badge {
    display: inline-block;
    padding: 4px 10px; border-radius: 100px;
    font-size: 12px; font-weight: 600;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .score-badge.high { background: rgba(44,182,125,0.2); color: var(--success); }
  .score-badge.mid { background: rgba(255,137,6,0.2); color: var(--accent); }
  .score-badge.low { background: rgba(229,49,112,0.2); color: var(--secondary); }

  /* TRAIN tab */
  .train-modes { display: grid; gap: 12px; }
  .train-mode-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 16px;
  }
  .train-mode-card:active { transform: scale(0.98); border-color: var(--accent); }
  .train-mode-icon {
    width: 56px; height: 56px; flex-shrink: 0;
    border-radius: 14px;
    display: grid; place-items: center;
    font-size: 26px;
  }
  .icon-quiz { background: linear-gradient(135deg, var(--info), #5e3fc7); }
  .icon-dictation { background: linear-gradient(135deg, var(--accent), var(--tertiary)); }
  .icon-flashcard { background: linear-gradient(135deg, var(--success), #1e8a5e); }
  .icon-dialog { background: linear-gradient(135deg, var(--secondary), #b8225a); }
  .icon-shadowing { background: linear-gradient(135deg, #4a90e2, var(--info)); }
  .icon-fill { background: linear-gradient(135deg, #f59e0b, var(--accent)); }
  .train-mode-info { flex: 1; min-width: 0; }
  .train-mode-title { font-weight: 600; font-size: 16px; margin-bottom: 3px; }
  .train-mode-desc { color: var(--text-muted); font-size: 12.5px; line-height: 1.4; }
  .train-mode-arrow { color: var(--text-muted); font-size: 20px; }

  /* Training session screen */
  .train-session {
    min-height: calc(100vh - 200px);
    display: flex; flex-direction: column;
  }
  .train-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .train-back {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 10px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .train-progress-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-muted); }
  .train-bar {
    background: var(--bg-card); border-radius: 100px; height: 6px;
    overflow: hidden; margin-bottom: 28px;
  }
  .train-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--secondary));
    border-radius: 100px; transition: width 0.4s;
  }
  .train-question {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px;
    margin-bottom: 20px;
    text-align: center;
  }
  .train-prompt-label {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 12px;
  }
  .train-prompt {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 24px; line-height: 1.3; margin-bottom: 16px;
  }
  .train-hint { color: var(--text-soft); font-size: 14px; margin-top: 8px; }
  .train-options { display: flex; flex-direction: column; gap: 10px; }
  .train-option {
    background: var(--bg-card); border: 2px solid var(--border);
    color: var(--text); padding: 16px;
    border-radius: 14px; cursor: pointer; font-family: inherit;
    font-size: 15px; text-align: left;
    transition: all 0.15s;
  }
  .train-option:active { transform: scale(0.98); }
  .train-option.selected { border-color: var(--accent); }
  .train-option.correct { border-color: var(--success); background: rgba(44,182,125,0.1); }
  .train-option.wrong { border-color: var(--secondary); background: rgba(229,49,112,0.1); }

  .train-input {
    width: 100%; background: var(--bg-card); border: 2px solid var(--border);
    color: var(--text); padding: 16px;
    border-radius: 14px; font-family: inherit; font-size: 16px;
    outline: none;
    margin-bottom: 16px;
  }
  .train-input:focus { border-color: var(--accent); }

  .train-feedback {
    padding: 16px; border-radius: 14px;
    margin-bottom: 16px; text-align: center;
  }
  .train-feedback.correct { background: rgba(44,182,125,0.15); border: 1px solid var(--success); }
  .train-feedback.wrong { background: rgba(229,49,112,0.15); border: 1px solid var(--secondary); }
  .train-feedback-emoji { font-size: 36px; margin-bottom: 8px; }
  .train-feedback-msg { font-family: 'Fraunces', serif; font-weight: 700; font-size: 20px; margin-bottom: 6px; }
  .train-feedback-answer { color: var(--text-soft); font-size: 14px; }

  /* Flashcard */
  .flashcard {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 24px;
    min-height: 240px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; cursor: pointer;
    margin-bottom: 20px;
    transition: transform 0.3s;
    user-select: none;
  }
  .flashcard.flipping { transform: rotateY(180deg); }
  .flashcard-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
  .flashcard-text { font-family: 'Fraunces', serif; font-weight: 700; font-size: 26px; line-height: 1.3; margin-bottom: 8px; }
  .flashcard-sub { color: var(--text-soft); font-size: 14px; }
  .flashcard-hint { color: var(--text-muted); font-size: 12px; margin-top: 24px; }
  .flashcard-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Dictation */
  .dictation-audio {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; padding: 30px; text-align: center;
    margin-bottom: 20px;
  }
  .play-btn {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--secondary));
    border: none; color: var(--bg);
    font-size: 32px; cursor: pointer;
    display: grid; place-items: center;
    margin: 0 auto 16px;
    transition: transform 0.15s;
    box-shadow: 0 8px 24px rgba(255,137,6,0.3);
  }
  .play-btn:active { transform: scale(0.92); }
  .speed-controls { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }

  /* Chat */
  .chat-header {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 16px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .chat-avatar {
    width: 40px; height: 40px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--info), var(--secondary));
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 20px;
  }
  .chat-name { font-weight: 600; font-size: 15px; }
  .chat-status { color: var(--success); font-size: 12px; display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

  .chat-messages {
    display: flex; flex-direction: column; gap: 12px;
    min-height: 300px;
    margin-bottom: 16px;
  }
  .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.5; word-wrap: break-word; }
  .msg.ai { background: var(--bg-card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 6px; }
  .msg.user { background: var(--accent); color: var(--bg); align-self: flex-end; border-bottom-right-radius: 6px; font-weight: 500; }
  .msg-translation {
    color: var(--text-muted); font-size: 12px;
    margin-top: 6px; padding-top: 6px;
    border-top: 1px solid var(--border);
    cursor: pointer;
  }
  .msg.user .msg-translation { border-top-color: rgba(0,0,0,0.2); color: rgba(0,0,0,0.7); }
  .msg-actions { display: flex; gap: 6px; margin-top: 8px; }
  .msg-mini-btn {
    background: rgba(255,255,255,0.05); border: none;
    color: var(--text-soft); font-size: 11px;
    padding: 4px 8px; border-radius: 6px; cursor: pointer;
    font-family: inherit;
  }
  .msg.user .msg-mini-btn { background: rgba(0,0,0,0.15); color: rgba(0,0,0,0.7); }
  .msg-loading { display: inline-flex; gap: 4px; }
  .msg-loading span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-soft);
    animation: bounce 1.4s infinite ease-in-out;
  }
  .msg-loading span:nth-child(2) { animation-delay: 0.16s; }
  .msg-loading span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

  .chat-input-wrap {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 8px;
    position: sticky; bottom: 76px;
  }
  .chat-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: 15px;
    padding: 8px 8px; resize: none; max-height: 100px;
  }
  .chat-input::placeholder { color: var(--text-muted); }
  .chat-btn {
    flex-shrink: 0; width: 40px; height: 40px;
    border: none; border-radius: 12px;
    background: var(--bg-soft); color: var(--text);
    font-size: 18px; cursor: pointer;
    display: grid; place-items: center;
    transition: all 0.15s;
  }
  .chat-btn.send { background: var(--accent); color: var(--bg); }
  .chat-btn.recording { background: var(--secondary); color: white; animation: pulse 1.2s infinite; }
  .chat-btn:active { transform: scale(0.93); }

  .topic-suggestions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
  .topic-suggestions::-webkit-scrollbar { display: none; }
  .topic-pill {
    background: var(--bg-soft); border: 1px solid var(--border);
    color: var(--text-soft); padding: 6px 12px; border-radius: 100px;
    font-size: 12px; white-space: nowrap; cursor: pointer;
    font-family: inherit;
  }
  .scenario-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
  .scenario-pills::-webkit-scrollbar { display: none; }
  .scenario-pill {
    background: linear-gradient(135deg, var(--info), var(--secondary));
    color: white; padding: 6px 12px; border-radius: 100px;
    font-size: 12px; white-space: nowrap; cursor: pointer;
    border: none; font-family: inherit; font-weight: 500;
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px;
  }
  .stat-icon { font-size: 22px; margin-bottom: 8px; }
  .stat-value {
    font-family: 'Fraunces', serif; font-weight: 800; font-size: 30px;

const STORE_KEY = 'speakup_v2';
let state = loadState();
let activeCategory = '전체';
let isRecording = false;
let recognition = null;
let currentPracticePhrase = null;

// Training session state
let trainSession = null;

// Microphone stream reference (for explicit cleanup)
let activeMicStream = null;

// Helper: forcefully release the microphone
function releaseMicrophone() {
  try {
    if (recognition) {
      try { recognition.onresult = null; } catch(e){}
      try { recognition.onerror = null; } catch(e){}
      try { recognition.onend = null; } catch(e){}
      try { recognition.abort(); } catch(e){}
      try { recognition.stop(); } catch(e){}
      recognition = null;
    }
  } catch(e) {}
  try {
    if (activeMicStream) {
      activeMicStream.getTracks().forEach(track => {
        try { track.stop(); } catch(e){}
      });
      activeMicStream = null;
    }
  } catch(e) {}
  isRecording = false;
}

// Pre-acquire mic stream so we have an explicit handle to stop later
async function acquireMicStream() {
  try {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      // release any previous stream first
      if (activeMicStream) {
        activeMicStream.getTracks().forEach(t => { try{t.stop();}catch(e){} });
        activeMicStream = null;
      }
      activeMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }
  } catch(e) {
    // permission denied or unsupported; recognition will still try
  }
}

function loadState() {
  try {
    const stored = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    return {
      mastered: stored.mastered || [],
      practiceCount: stored.practiceCount || 0,
      chatCount: stored.chatCount || 0,
      chatHistory: stored.chatHistory || [],
      streak: stored.streak || 0,
      lastVisit: stored.lastVisit || null,
      practiceScores: stored.practiceScores || {},
      quizCorrect: stored.quizCorrect || 0,
      quizTotal: stored.quizTotal || 0,
      visitDays: stored.visitDays || [],
      dailyMission: stored.dailyMission || null,
      missionProgress: stored.missionProgress || 0,
      missionDate: stored.missionDate || null
    };
  } catch {
    return {mastered: [], practiceCount: 0, chatCount: 0, chatHistory: [], streak: 0, lastVisit: null, practiceScores: {}, quizCorrect: 0, quizTotal: 0, visitDays: [], dailyMission: null, missionProgress: 0, missionDate: null};
  }
}
function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}
function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastVisit === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  state.streak = state.lastVisit === yesterday ? state.streak + 1 : 1;
  state.lastVisit = today;
  if (!state.visitDays.includes(today)) state.visitDays.push(today);
  saveState();
}

function getDailyMission() {
  const today = new Date().toDateString();
  if (state.missionDate !== today || !state.dailyMission) {
    // pick deterministic mission based on date
    const seed = new Date().getDate() + new Date().getMonth();
    state.dailyMission = MISSION_TEMPLATES[seed % MISSION_TEMPLATES.length].id;
    state.missionDate = today;
    state.missionProgress = 0;
    saveState();
  }
  return MISSION_TEMPLATES.find(m => m.id === state.dailyMission);
}

function trackMissionProgress(type, amount = 1) {
  const mission = getDailyMission();
  if (!mission || mission.type !== type) return;
  if (state.missionProgress >= mission.target) return;
  state.missionProgress = Math.min(mission.target, state.missionProgress + amount);
  saveState();
  if (state.missionProgress >= mission.target) {
    setTimeout(() => {
      showCompletion('🎯', '미션 완료!', `${mission.title}\n내일 새로운 미션이 기다려요!`);
    }, 500);
  }
  renderHome();
}

function startDailyMission() {
  const m = getDailyMission();
  if (m.type === 'quiz') { switchView('train'); }
  else if (m.type === 'chat') { switchView('chat'); }
  else if (m.type === 'practice' || m.type === 'master') { switchView('phrases'); }
  else if (m.type === 'dictation') { switchView('train'); }
}

function speak(text, rate = 0.9) {
  if (!('speechSynthesis' in window)) {
    alert('이 브라우저는 음성 기능을 지원하지 않습니다.');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = rate;
  utter.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang === 'en-US' && (v.name.includes('Google') || v.name.includes('Samantha'))) 
    || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utter.voice = enVoice;
  window.speechSynthesis.speak(utter);
  return new Promise(resolve => {
    utter.onend = resolve;
    utter.onerror = resolve;
  });
}
function speakSlow(text) { return speak(text, 0.6); }
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}

// ============================================================
// SPEECH RECOGNITION
// ============================================================
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.maxAlternatives = 3;
  return rec;
}

function practicePronunciation(phraseId) {
  const phrase = PHRASES.find(p => p.id === phraseId);
  if (!phrase) return;
  currentPracticePhrase = phrase;
  
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert('이 브라우저는 음성 인식을 지원하지 않습니다.\n크롬 또는 사파리에서 사용해주세요.');
    return;
  }
  
  const btn = document.querySelector(`[data-rec-btn="${phraseId}"]`);
  if (!btn) return;
  
  if (isRecording) {
    releaseMicrophone();
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 따라 말하기';
    return;
  }
  
  acquireMicStream().finally(() => {
    recognition = initRecognition();
    if (!recognition) return;
    
    recognition.onstart = () => {
      isRecording = true;
      btn.classList.add('recording');
      btn.innerHTML = '🔴 듣는 중...';
    };
    recognition.onresult = (event) => {
      const result = event.results[0];
      let bestScore = 0;
      let bestTranscript = '';
      for (let i = 0; i < result.length; i++) {
        const transcript = result[i].transcript;
        const score = calculateScore(phrase.en, transcript);
        if (score > bestScore) {
          bestScore = score;
          bestTranscript = transcript;
        }
      }
      showPronunciationResult(phrase, bestTranscript, bestScore);
      state.practiceCount++;
      state.practiceScores[phraseId] = Math.max(state.practiceScores[phraseId] || 0, bestScore);
      trackMissionProgress('practice');
      saveState();
      renderPhrases();
    };
    recognition.onerror = (event) => {
      releaseMicrophone();
      btn.classList.remove('recording');
      btn.innerHTML = '🎤 따라 말하기';
      if (event.error === 'no-speech') alert('음성이 감지되지 않았어요. 다시 시도해주세요.');
      else if (event.error === 'not-allowed') alert('마이크 권한을 허용해주세요.');
    };
    recognition.onend = () => {
      // CRITICAL: explicitly release the mic when recognition ends
      releaseMicrophone();
      btn.classList.remove('recording');
      btn.innerHTML = '🎤 따라 말하기';
    };
    
    try {
      recognition.start();
    } catch(err) {
      releaseMicrophone();
      btn.classList.remove('recording');
      btn.innerHTML = '🎤 따라 말하기';
    }
  });
}

function calculateScore(target, said) {
  const normalize = (s) => s.toLowerCase().replace(/[^a-z\s]/g, '').trim().split(/\s+/);
  const t = normalize(target);
  const s = normalize(said);
  if (t.length === 0) return 0;
  let matched = 0;
  let lastIdx = -1;
  t.forEach(word => {
    const idx = s.findIndex((w, i) => i > lastIdx && w === word);
    if (idx > -1) {
      matched++;
      lastIdx = idx;
    } else if (s.includes(word)) {
      matched += 0.7;
    }
  });
  const wordScore = (matched / t.length) * 100;
  const lenRatio = Math.min(s.length, t.length) / Math.max(s.length, t.length);
  return Math.round(wordScore * (0.7 + 0.3 * lenRatio));
}

function showPronunciationResult(phrase, transcript, score) {
  const modal = document.getElementById('pronModal');

  else { emoji = '🌱'; msg = '다시 한 번 들어볼까요?'; cls = 'low'; }
  
  content.innerHTML = `
    <div style="font-size: 56px; margin-bottom: 8px;">${emoji}</div>
    <div class="display" style="font-size: 28px; margin-bottom: 16px;">${msg}</div>
    <div class="score-badge ${cls}" style="font-size: 22px; padding: 8px 20px; margin-bottom: 20px;">${score}점</div>

      <div style="font-family: 'Fraunces', serif; font-weight: 600;">${phrase.en}</div>

    <div style="background: var(--bg-soft); padding: 12px; border-radius: 12px; text-align: left;">
      <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px;">내가 말한 것</div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px;">"${transcript}"</div>

  }).join('');

function goToDay(dayNum) {
  const day = DAYS.find(d => d.day === dayNum);
  if (!day) return;
  const cat = PHRASES.find(p => p.id === day.phraseIds[0])?.cat;
  if (cat) activeCategory = cat;
  switchView('phrases');
}

function setCategory(cat) {
  activeCategory = cat;
  renderPhrases();
}

function toggleMaster(id) {
  const idx = state.mastered.indexOf(id);
  if (idx === -1) {
    state.mastered.push(id);
    trackMissionProgress('master');
  } else {
    state.mastered.splice(idx, 1);
  }
  saveState();
  renderPhrases();
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startTraining(mode) {
  document.getElementById('trainHome').style.display = 'none';
  document.getElementById('trainSession').style.display = 'block';
  trainSession = {
    mode: mode,
    index: 0,
    correct: 0,
    questions: [],
    selectedAnswer: null,
    showAnswer: false
  };
  
  if (mode === 'quiz' || mode === 'reverse') {
    const phrases = shuffle(PHRASES).slice(0, 10);
    trainSession.questions = phrases.map(p => {
      const others = shuffle(PHRASES.filter(x => x.id !== p.id)).slice(0, 3);
      const allOptions = shuffle([p, ...others]);
      return { phrase: p, options: allOptions };
    });
  } else if (mode === 'dictation') {
    trainSession.questions = shuffle(PHRASES).slice(0, 5);
  } else if (mode === 'fillblank') {
    // pick phrases with multi-word for fill-blank
    const multiWord = PHRASES.filter(p => p.en.split(' ').length >= 4);
    trainSession.questions = shuffle(multiWord).slice(0, 8).map(p => {
      const words = p.en.split(' ');
      // find a meaningful word (not first, not punctuation-only)
      const candidates = words
        .map((w, i) => ({w, i}))
        .filter(({w, i}) => i > 0 && /[a-zA-Z]{3,}/.test(w));
      const target = candidates[Math.floor(Math.random() * candidates.length)] || {w: words[1], i: 1};
      // strip punctuation from target word for answer
      const cleanWord = target.w.replace(/[^a-zA-Z']/g, '');
      return { phrase: p, blankIndex: target.i, answer: cleanWord, originalWord: target.w };
    });
  } else if (mode === 'flashcard') {
    trainSession.questions = shuffle(PHRASES);
    trainSession.flipped = false;
  } else if (mode === 'shadowing') {
    trainSession.questions = shuffle(PHRASES).slice(0, 5);
  }
  
  renderTraining();
}

function exitTraining() {
  document.getElementById('trainHome').style.display = 'block';
  document.getElementById('trainSession').style.display = 'none';
  trainSession = null;
  if (recognition) try { recognition.stop(); } catch{}
}

function renderTraining() {
  const container = document.getElementById('trainSession');
  if (!trainSession) return;
  const { mode, index, questions, correct } = trainSession;
  
  if (index >= questions.length && mode !== 'flashcard') {
    // Show completion
    const total = questions.length;
    const pct = Math.round((correct / total) * 100);
    let emoji = '🎉';
    if (pct < 50) emoji = '💪';
    else if (pct < 80) emoji = '👍';
    container.innerHTML = `
      <div class="train-header">
        <button class="train-back" onclick="exitTraining()">← 훈련 메뉴</button>
      </div>
      <div class="train-question" style="padding: 40px 24px;">
        <div style="font-size: 64px; margin-bottom: 12px;">${emoji}</div>
        <div class="display" style="font-size: 28px; margin-bottom: 8px;">훈련 완료!</div>
        <div style="color: var(--text-soft); font-size: 16px; margin-bottom: 20px;">${correct} / ${total} 정답 · ${pct}%</div>
        <button class="action-btn primary big wide" onclick="startTraining('${mode}')" style="margin-bottom: 8px;">🔄 다시 도전</button>
        <button class="action-btn big wide" onclick="exitTraining()">📋 다른 훈련 보기</button>
      </div>
    `;
    return;
  }
  
  const q = questions[index];
  const progressPct = mode === 'flashcard' ? 0 : ((index) / questions.length) * 100;
  
  let questionHTML = '';
  
  if (mode === 'quiz') {
    // Show Korean, pick English
    questionHTML = `
      <div class="train-question">
        <div class="train-prompt-label">한국어 → 영어</div>
        <div class="train-prompt">${q.phrase.ko}</div>
      </div>
      <div class="train-options">
        ${q.options.map((opt, i) => {
          let cls = '';
          if (trainSession.showAnswer) {
            if (opt.id === q.phrase.id) cls = 'correct';
            else if (i === trainSession.selectedAnswer && opt.id !== q.phrase.id) cls = 'wrong';
          }
          return `<button class="train-option ${cls}" ${trainSession.showAnswer ? 'disabled' : ''} onclick="answerQuiz(${i})">${opt.en}</button>`;
        }).join('')}
      </div>
    `;
  } else if (mode === 'reverse') {
    questionHTML = `
      <div class="train-question">
        <div class="train-prompt-label">영어 → 한국어</div>
        <div class="train-prompt">${q.phrase.en}</div>
        <button class="action-btn" style="margin-top: 8px;" onclick="speak('${q.phrase.en.replace(/'/g,"\\'")}')">🔊 듣기</button>
      </div>
      <div class="train-options">
        ${q.options.map((opt, i) => {
          let cls = '';
          if (trainSession.showAnswer) {
            if (opt.id === q.phrase.id) cls = 'correct';
            else if (i === trainSession.selectedAnswer && opt.id !== q.phrase.id) cls = 'wrong';
          }
          return `<button class="train-option ${cls}" ${trainSession.showAnswer ? 'disabled' : ''} onclick="answerQuiz(${i})">${opt.ko}</button>`;
        }).join('')}
      </div>
    `;
  } else if (mode === 'dictation') {
    questionHTML = `
      <div class="dictation-audio">
        <div class="train-prompt-label">들리는 영어를 받아쓰세요</div>
        <button class="play-btn" onclick="speak('${q.en.replace(/'/g,"\\'")}')">▶</button>
        <div style="color: var(--text-soft); font-size: 13px; margin-bottom: 8px;">${q.ko}</div>
        <div class="speed-controls">
          <button class="action-btn" onclick="speak('${q.en.replace(/'/g,"\\'")}', 1.0)">🔊 보통</button>
          <button class="action-btn" onclick="speak('${q.en.replace(/'/g,"\\'")}', 0.6)">🐢 천천히</button>
        </div>
      </div>
      <input type="text" class="train-input" id="dictationInput" placeholder="들은 영어를 입력하세요..." autocomplete="off" autocorrect="off" autocapitalize="off">
      ${trainSession.showAnswer ? `
        <div class="train-feedback ${trainSession.lastCorrect ? 'correct' : 'wrong'}">
          <div class="train-feedback-emoji">${trainSession.lastCorrect ? '🎉' : '💪'}</div>
          <div class="train-feedback-msg">${trainSession.lastCorrect ? '정답!' : '정답 확인하기'}</div>
          <div class="train-feedback-answer">${q.en}</div>
        </div>
        <button class="action-btn primary big wide" onclick="nextQuestion()">다음 →</button>
      ` : `
        <button class="action-btn primary big wide" onclick="answerDictation()">정답 확인</button>
      `}
    `;
  } else if (mode === 'fillblank') {
    const words = q.phrase.en.split(' ');
    const display = words.map((w, i) => i === q.blankIndex ? '<span style="color: var(--accent); font-weight: 800;">_____</span>' : w).join(' ');
    questionHTML = `
      <div class="train-question">
        <div class="train-prompt-label">빈칸에 들어갈 단어는?</div>
        <div class="train-prompt">${display}</div>
        <div class="train-hint">${q.phrase.ko}</div>
        <button class="action-btn" style="margin-top: 12px;" onclick="speak('${q.phrase.en.replace(/'/g,"\\'")}')">🔊 듣기 (정답 포함)</button>
      </div>
      <input type="text" class="train-input" id="fillInput" placeholder="단어를 입력하세요..." autocomplete="off" autocorrect="off" autocapitalize="off">
      ${trainSession.showAnswer ? `
        <div class="train-feedback ${trainSession.lastCorrect ? 'correct' : 'wrong'}">
          <div class="train-feedback-emoji">${trainSession.lastCorrect ? '🎉' : '💪'}</div>
          <div class="train-feedback-msg">${trainSession.lastCorrect ? '정답!' : '아쉬워요'}</div>
          <div class="train-feedback-answer">정답: <b>${q.answer}</b></div>
        </div>
        <button class="action-btn primary big wide" onclick="nextQuestion()">다음 →</button>
      ` : `
        <button class="action-btn primary big wide" onclick="answerFillBlank()">정답 확인</button>
      `}
    `;
  } else if (mode === 'flashcard') {
    const flipped = trainSession.flipped;
    questionHTML = `
      <div class="flashcard" onclick="flipFlashcard()">
        <div class="flashcard-label">${flipped ? '한국어 뜻' : '영어 표현'}</div>
        <div class="flashcard-text">${flipped ? q.ko : q.en}</div>
        ${flipped ? `<div class="flashcard-sub">${q.en}</div>` : `<div class="flashcard-sub">${q.cat}</div>`}
        <div class="flashcard-hint">탭해서 뒤집기</div>
      </div>
      <div class="flashcard-actions">
        <button class="action-btn big" onclick="speak('${q.en.replace(/'/g,"\\'")}')">🔊 듣기</button>
        <button class="action-btn primary big" onclick="nextFlashcard()">다음 카드 →</button>
      </div>
    `;
  } else if (mode === 'shadowing') {
    questionHTML = `
      <div class="train-question">
        <div class="train-prompt-label">들은 후 따라 말하세요</div>
        <div class="train-prompt">${q.en}</div>
        <div class="train-hint">${q.ko}</div>
        <div class="speed-controls" style="margin-top: 16px;">
          <button class="action-btn" onclick="speak('${q.en.replace(/'/g,"\\'")}')">🔊 듣기</button>
          <button class="action-btn" onclick="speakSlow('${q.en.replace(/'/g,"\\'")}')">🐢 천천히</button>
        </div>
      </div>
      ${trainSession.lastScore !== undefined ? `
        <div class="train-feedback ${trainSession.lastScore >= 70 ? 'correct' : 'wrong'}">
          <div class="train-feedback-emoji">${trainSession.lastScore >= 85 ? '🎉' : trainSession.lastScore >= 70 ? '👍' : '💪'}</div>
          <div class="train-feedback-msg">${trainSession.lastScore}점</div>
          <div class="train-feedback-answer">"${trainSession.lastTranscript}"</div>
        </div>
        <button class="action-btn primary big wide" onclick="nextQuestion()">다음 →</button>
      ` : `
        <button class="action-btn primary big wide" data-rec-shadow="1" onclick="shadowingRecord()">🎤 따라 말하기</button>
      `}
    `;
  }
  
  container.innerHTML = `
    <div class="train-header">
      <button class="train-back" onclick="exitTraining()">← 메뉴</button>
      <div class="train-progress-text">${mode === 'flashcard' ? `${index + 1}` : `${index + 1} / ${questions.length}`}</div>
    </div>
    <div class="train-bar"><div class="train-bar-fill" style="width: ${progressPct}%"></div></div>
    ${questionHTML}
  `;
  
  // Auto-focus input
  if (mode === 'dictation' && !trainSession.showAnswer) {
    setTimeout(() => document.getElementById('dictationInput')?.focus(), 100);
    setTimeout(() => speak(q.en), 400);
  }
  if (mode === 'fillblank' && !trainSession.showAnswer) {
    setTimeout(() => document.getElementById('fillInput')?.focus(), 100);
  }
  // Auto-play for shadowing
  if (mode === 'shadowing' && trainSession.lastScore === undefined) {
    setTimeout(() => speak(q.en), 400);
  }
}

function answerQuiz(optionIdx) {
  if (trainSession.showAnswer) return;
  const q = trainSession.questions[trainSession.index];
  trainSession.selectedAnswer = optionIdx;
  trainSession.showAnswer = true;
  const isCorrect = q.options[optionIdx].id === q.phrase.id;
  if (isCorrect) {
    trainSession.correct++;
    state.quizCorrect++;
    trackMissionProgress('quiz');
  }
  state.quizTotal++;
  saveState();
  renderTraining();
  setTimeout(() => {
    trainSession.index++;
    trainSession.selectedAnswer = null;
    trainSession.showAnswer = false;
    renderTraining();
  }, 1500);
}

function answerDictation() {
  const input = document.getElementById('dictationInput');
  const val = (input?.value || '').trim();
  if (!val) return;
  const q = trainSession.questions[trainSession.index];
  const correct = normalizeForCompare(val) === normalizeForCompare(q.en);
  trainSession.showAnswer = true;
  trainSession.lastCorrect = correct;
  if (correct) {
    trainSession.correct++;
    trackMissionProgress('dictation');
  }
  saveState();
  renderTraining();
}

function answerFillBlank() {
  const input = document.getElementById('fillInput');
  const val = (input?.value || '').trim().toLowerCase();
  if (!val) return;
  const q = trainSession.questions[trainSession.index];
  const correct = val === q.answer.toLowerCase();
  trainSession.showAnswer = true;
  trainSession.lastCorrect = correct;
  if (correct) trainSession.correct++;
  renderTraining();
}

function normalizeForCompare(s) {
  return s.toLowerCase().replace(/[^a-z\s]/g, '').replace(/\s+/g, ' ').trim();
}

function nextQuestion() {
  trainSession.index++;
  trainSession.showAnswer = false;
  trainSession.lastCorrect = undefined;
  trainSession.lastScore = undefined;
  trainSession.lastTranscript = undefined;
  renderTraining();
}

function flipFlashcard() {
  trainSession.flipped = !trainSession.flipped;
  renderTraining();
}

function nextFlashcard() {
  trainSession.index = (trainSession.index + 1) % trainSession.questions.length;
  trainSession.flipped = false;
  renderTraining();
}

function shadowingRecord() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('이 브라우저는 음성 인식을 지원하지 않습니다.'); return; }
  const q = trainSession.questions[trainSession.index];
  const btn = document.querySelector('[data-rec-shadow="1"]');
  if (!btn) return;
  
  if (isRecording) {
    releaseMicrophone();
    btn.classList.remove('recording');
    btn.innerHTML = '🎤 따라 말하기';
    return;
  }
  
  acquireMicStream().finally(() => {
    recognition = initRecognition();
    if (!recognition) return;
    
    recognition.onstart = () => {
      isRecording = true;
      btn.classList.add('recording');
      btn.innerHTML = '🔴 듣는 중... (말씀하세요)';
    };
    recognition.onresult = (event) => {
      const result = event.results[0];
      let bestScore = 0, bestTranscript = '';
      for (let i = 0; i < result.length; i++) {
        const transcript = result[i].transcript;
        const score = calculateScore(q.en, transcript);
        if (score > bestScore) { bestScore = score; bestTranscript = transcript; }
      }
      trainSession.lastScore = bestScore;
      trainSession.lastTranscript = bestTranscript;
      if (bestScore >= 70) trainSession.correct++;
      state.practiceCount++;
      trackMissionProgress('practice');
      saveState();
      renderTraining();
    };
    recognition.onerror = () => {
      releaseMicrophone();
      const b = document.querySelector('[data-rec-shadow="1"]');
      if (b) { b.classList.remove('recording'); b.innerHTML = '🎤 따라 말하기'; }
    };
    recognition.onend = () => {
      releaseMicrophone();
      const b = document.querySelector('[data-rec-shadow="1"]');
      if (b) { b.classList.remove('recording'); b.innerHTML = '🎤 따라 말하기'; }
    };
    
    try {
      recognition.start();
    } catch(err) {
      releaseMicrophone();
      const b = document.querySelector('[data-rec-shadow="1"]');
      if (b) { b.classList.remove('recording'); b.innerHTML = '🎤 따라 말하기'; }
    }
  });
}

// CHAT
// ============================================================
let currentScenario = null;

function renderChat() {
  const container = document.getElementById('chatMessages');
  if (state.chatHistory.length === 0) {
    container.innerHTML = `
      <div class="msg ai">
        <div>Hi! I'm Emma 😊 I'm your English conversation partner. Let's talk slowly, in simple English.</div>
        <div class="msg-translation">안녕! 저는 에마예요. 영어 회화 파트너입니다. 천천히, 쉬운 영어로 얘기해봐요.</div>
        <div class="msg-actions">
          <button class="msg-mini-btn" onclick="speak('Hi! I am Emma. I am your English conversation partner. Let us talk slowly, in simple English.')">🔊 듣기</button>
        </div>
      </div>
      <div class="msg ai">
        <div>How are you today? You can answer in English. Try: "I'm good, thanks!"</div>
        <div class="msg-translation">오늘 어때요? 영어로 답해보세요. 예: "I'm good, thanks!"</div>
        <div class="msg-actions">
          <button class="msg-mini-btn" onclick="speak('How are you today? You can answer in English. Try: I am good, thanks!')">🔊 듣기</button>
        </div>
      </div>
    `;
    return;
  }
  container.innerHTML = state.chatHistory.map(m => {
    if (m.role === 'user') {
      return `<div class="msg user"><div>${escapeHtml(m.content)}</div></div>`;
    }
    const enText = m.content;
    const koText = m.translation || '';
    return `
      <div class="msg ai">
        <div>${escapeHtml(enText)}</div>
        ${koText ? `<div class="msg-translation">${escapeHtml(koText)}</div>` : ''}
        <div class="msg-actions">
          <button class="msg-mini-btn" onclick="speak(${JSON.stringify(enText).replace(/"/g,'&quot;')})">🔊 듣기</button>
          <button class="msg-mini-btn" onclick="speakSlow(${JSON.stringify(enText).replace(/"/g,'&quot;')})">🐢 천천히</button>
        </div>
      </div>
    `;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function useTopic(text) {
  document.getElementById('chatInput').value = text;
  document.getElementById('chatInput').focus();
}

function startScenario(key) {
  const sc = SCENARIOS[key];
  if (!sc) return;
  if (state.chatHistory.length > 0) {
    if (!confirm(`현재 대화를 종료하고 [${sc.name}] 상황극을 시작할까요?`)) return;
  }
  currentScenario = key;
  state.chatHistory = [
    { role: 'assistant', content: sc.starter.en, translation: sc.starter.ko, scenario: key }
  ];
  saveState();
  renderChat();
  setTimeout(() => speak(sc.starter.en), 400);
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  
  state.chatHistory.push({role: 'user', content: text});
  state.chatCount++;
  trackMissionProgress('chat');
  saveState();
  input.value = '';
  input.style.height = 'auto';
  renderChat();
  
  const container = document.getElementById('chatMessages');
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'msg ai';
  loadingDiv.innerHTML = '<div class="msg-loading"><span></span><span></span><span></span></div>';
  container.appendChild(loadingDiv);
  container.scrollTop = container.scrollHeight;
  
  try {
    const reply = await callClaudeAPI(state.chatHistory);
    loadingDiv.remove();
    state.chatHistory.push({role: 'assistant', content: reply.en, translation: reply.ko});
    saveState();
    renderChat();
    setTimeout(() => speak(reply.en), 300);
  } catch (err) {
    loadingDiv.remove();
    state.chatHistory.push({
      role: 'assistant', 
      content: "Sorry, I had a connection problem. Let's try again!", 
      translation: '연결 문제가 있었어요. 다시 시도해봐요!'
    });
    saveState();
    renderChat();
  }
}

async function callClaudeAPI(history) {
  // Detect if we're in a scenario
  const firstAi = history.find(m => m.role === 'assistant');
  const scenarioKey = firstAi?.scenario;
  const sc = scenarioKey ? SCENARIOS[scenarioKey] : null;
  
  const baseSystem = `You are Emma, a warm and patient English conversation tutor for a Korean beginner learner.

CRITICAL RULES:
1. Use VERY simple English. Beginner level (A1-A2). Short sentences. Common words only.
2. Keep responses SHORT: 1-3 sentences max.
3. Always ask a simple follow-up question to keep the conversation going.
4. If the user writes in Korean, gently encourage them in Korean to try English, but still help.
5. If their English has a small mistake, don't correct directly. Just use the correct form in your reply naturally.
6. Be very warm, encouraging, use emojis sparingly (1 per message max).
7. Respond ONLY in this exact JSON format with no markdown, no code blocks, no extra text:
{"en": "your English response", "ko": "한국어 번역"}`;
  
  const scenarioAdd = sc ? `\n\nSCENARIO MODE: You are role-playing a character in this situation:\n${sc.setting}\n\nStay IN CHARACTER. React as the character would. Push the scenario forward naturally toward completion (ordering done, check-in complete, etc). After 5-7 exchanges, wrap up naturally.` : '';
  
  const systemPrompt = baseSystem + scenarioAdd + `\n\nExample good response:\n{"en": "That sounds fun! What did you eat for lunch?", "ko": "재밌네요! 점심으로 뭐 먹었어요?"}`;

  const messages = history.slice(-10).map(m => ({
    role: m.role,
    content: m.content
  }));

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 300,
      system: systemPrompt,
      messages: messages
    })
  });
  
  if (!response.ok) throw new Error('API error');
  const data = await response.json();
  const textBlock = data.content.find(b => b.type === 'text');
  const raw = textBlock?.text || '';
  const cleaned = raw.replace(/```json|```/g, '').trim();
  try {
    const parsed = JSON.parse(cleaned);
    return {en: parsed.en || cleaned, ko: parsed.ko || ''};
  } catch {
    return {en: cleaned, ko: ''};
  }
}

function resetChat() {
  if (!confirm('대화를 처음부터 다시 시작할까요?')) return;
  state.chatHistory = [];
  currentScenario = null;
  saveState();
  renderChat();
}

function toggleVoiceInput() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('이 브라우저는 음성 입력을 지원하지 않습니다.'); return; }
  const btn = document.getElementById('micBtn');
  
  // If already recording, stop and release fully
  if (isRecording) {
    releaseMicrophone();
    if (btn) { btn.classList.remove('recording'); btn.innerHTML = '🎤'; }
    return;
  }
  
  // Acquire explicit mic stream first, then start recognition
  acquireMicStream().finally(() => {
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = false;
    
    recognition.onstart = () => {
      isRecording = true;
      btn.classList.add('recording');
    };
    recognition.onresult = (e) => {
      try {
        const text = e.results[0][0].transcript;
        document.getElementById('chatInput').value = text;
      } catch(err) {}
    };
    recognition.onerror = () => {
      releaseMicrophone();
      if (btn) { btn.classList.remove('recording'); btn.innerHTML = '🎤'; }
    };
    recognition.onend = () => {
      // Explicitly release mic stream when recognition ends
      releaseMicrophone();
      if (btn) { btn.classList.remove('recording'); btn.innerHTML = '🎤'; }
    };
    
    try {
      recognition.start();
    } catch(err) {
      releaseMicrophone();
      if (btn) { btn.classList.remove('recording'); btn.innerHTML = '🎤'; }
    }
  });
}

// Safety net: release the mic when the page is hidden, navigated away, or closed
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    releaseMicrophone();
    // remove visual recording states everywhere
    document.querySelectorAll('.recording').forEach(el => el.classList.remove('recording'));
    const micBtn = document.getElementById('micBtn');
    if (micBtn) micBtn.innerHTML = '🎤';
  }
});
window.addEventListener('pagehide', () => { releaseMicrophone(); });
window.addEventListener('beforeunload', () => { releaseMicrophone(); });
// Also release mic when switching tabs in the app
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => { 
    if (isRecording) {
      releaseMicrophone();
      document.querySelectorAll('.recording').forEach(el => el.classList.remove('recording'));
      const micBtn = document.getElementById('micBtn');
      if (micBtn) micBtn.innerHTML = '🎤';
    }
  });
});
